

<!-- Show a loading spinner or message while data is being fetched -->
 <!-- Loader Overlay -->
 <div class="loader-overlay" *ngIf="isLoading">
  <div class="loader-container">
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
 </div>
</div>


<header class="header"  [class.with-border]="categoriesActive" >
    <div class="header-containt">

    <div class="sidebar-field">
         <!-- Button with Font Awesome Navbar Icon -->
    <button class="sidebar-icon-btn"  (click)="toggleCategories()">
      <div class="icon" [ngClass]="categoriesActive ? 'close' : 'hamburger'">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </button>

    <a href="" class="logo">
      <!--<img src="assets/Images/this-portgenix-logo.png" alt="Logo" class="circle-image">-->
      <label class="my-web-logo" for="">Portgenix</label>
    </a>

    </div>

      
   

    <nav class="categories"  [class.active]="categoriesActive" [class.scrollable]="exploreActive">
      <div class="categories-field">
        <ul class="hed-list-field">
          <li class="categories-btn" >
            <a class="explore-btn" (click)="toggleExplore()" >Explore
              <img 
              [src]="selectedImage"
              alt="Selected Image"
              class="icon-bar"
                />
            </a>
            
            <ul class="dropdown" [class.reactive]="exploreActive" >
              <li class="explore-list-pro">
                <div class="list-fecture">
                 
                  <a href="">
                    <img src="assets/Images/star.png"  alt="">
                    <div class="premium-list">
                      <button class="pro-btn-list">
                       Go Pro
                      </button>
                     </div>
                  </a>
                </div>
                <div class="list-fecture">
                  <a href="">
                    <img src="assets/Images/new.png" class="new-img" alt="">
  
                    Product updates
                  </a>
                </div>
                <hr>
             </li>
              <li class="explore-list"><a href="">Designers</a></li>
              <li class="explore-list"><a href="">Photographers</a></li>
              <li class="explore-list"><a href="">Devloper</a></li>
              <li class="explore-list"><a href="">videographers</a></li>
              <li class="explore-list"><a href="">Educators</a></li>
              <li class="explore-list"><a href="">Marketers</a></li>
              <li class="explore-list"><a href="">Entrepreneurs</a></li>
              <li class="explore-list"><a href="">Travel Enthusiasts</a></li>
  
            </ul>
          </li>
    
          <li class="home" routerLinkActive="active">
            <a routerLink="/dashbord" class="explore-btn"><i class="bi bi-house"></i></a>
          </li>
    
          <li class="service"  routerLinkActive="active">
            <a routerLink="/user/explore" class="explore-btn"><i class="bi bi-compass"></i></a>
          </li>
    
          <li class="about" routerLinkActive="active">
            <a routerLink="/user/message" class="explore-btn"><i class="bi bi-chat-right-dots"></i></a>
          </li>
        </ul>
      </div>

  </nav>
    
     <!-- Conditional buttons -->
  

    <div class="user-login-field">

      <div class="user-login-field-content">
        
        <div class="user-login-field-group1">

          <div class="create">
            <button  class="fav-a-field" style="color:black;" 
                    data-bs-toggle="modal" data-bs-target="#create-Modal" (click)="openModal('create')">
            <i class="bi bi-patch-plus"></i>

            </button>
           </div>

          <div class="fav">
            <button routerLink="/favorites" class="fav-a-field" style="color:black;">
              <i class="bi bi-heart"></i>

            </button>
          </div>

          <div class="msg">
            <button routerLink="/notification" class="fav-a-field" style="color:black;">
              <i class="bi bi-bell"></i>
            </button>
          </div>

          

        </div>

        <div class="user-login-field-group2" *ngIf="isLoggedIn">
          

         
           
           <div class="profile">
            
               <div class="profile-img-field">
                 <a routerLink="/user/profile" class="user-profile-img-link">
                   <img [src]="profileImage" alt="Profile" class="profileimg"/>
                 </a>
               </div>



               <div class="profile-list-container">

                <div class="profile-list-field">

                  <div class="profile-list-1">

                    <div class="profile-img-field-2">
                        <img [src]="profileImage" alt="Profile" class="profileimg"/>
                    </div>

                    <div class="username-filed">
                      <label for="" class="profile-username-tag">Hii,{{ userName }}</label>
                    </div>

                  </div>

                  <div class="profile-list-group2">

                    <div class="profile-list-2">
                      <a routerLink="/user/profile" class="profile-list-tag">Go to account</a>
                    </div>

                    <hr class="profile-list-horizontal">

                    <div class="profile-list-3">
                      <a href="" class="profile-list-tag"  (click)="onLogout()" >Sign Out</a>
                    </div>

                  </div>

                </div>

               </div>
     
           </div>

           
        </div>

        <!-- Conditional buttons -->
  
      <div class="auth-btn-field" *ngIf="!isLoggedIn">

      <div class="login-btn1">
        <button class="login-btn2" routerLink="/login">
            Login
        </button>
      </div>
  
      </div>

      </div>
      
    </div>

  

    </div>

    
</header>



<!-- ------------------------------------ create modal -------------------------------->

<!-- Bootstrap Modal with Your Custom Form -->
<div class="modal fade" id="create-Modal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        
        <div class="main-modal-container">

          <div class="crtmodal-class">


            <button class="crtmodal-btn"  (click)="Usercheck()">

              <div class="crtmodal-logo">
                <i class="bi bi-pin"></i>
              </div>

              <label for="" class="crtmodal-label1">New Post
                <label for="" class="crtmodal-label2">
                  Post your creative work, share your ideas, and inspire others. 
                </label>
              </label>

            </button>
          

          </div> 

        <div class="crtmodal-class">

           <button class="crtmodal-btn">

              <div class="crtmodal-logo">
                <i class="bi bi-columns"></i>
              </div>

              <label for="" class="crtmodal-label1">Collection
                <label for="" class="crtmodal-label2">
                  Organize a collection of your favorite Posts by creating a board
                </label>
              </label>

            </button>

        </div>

        
        </div>

        <div class="close-modal-container">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>

        </div>
  
      </div>
    </div>
  </div>
